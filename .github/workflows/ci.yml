name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: |
          ruff check app tests

      - name: Compile Check
        run: |
          python -m compileall app

      - name: Integration Suite (skip-safe)
        run: |
          python -m pytest -q tests/integration/test_real_data_flow.py

      - name: Container Build
        run: |
          docker build -t unified-agentic-ai:ci .
